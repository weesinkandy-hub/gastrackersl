<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ගෑස් Tracker SL - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; }
        .gas-card { transition: all 0.3s ease; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-10 bg-white p-8 rounded-3xl shadow-sm border border-blue-50">
            <h1 class="text-4xl font-extrabold text-blue-800 mb-2 underline decoration-yellow-400">🔥 ගෑස් Tracker SL</h1>
            <p class="text-gray-500">සජීවීව දත්ත යාවත්කාලීන වන පද්ධතිය</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-lg border border-gray-100 h-fit">
                <h2 class="text-xl font-bold mb-5 text-gray-700 border-b pb-2">අලුත් තොරතුරක් දමන්න</h2>
                <form id="gasForm" class="space-y-4">
                    <input type="text" id="district" placeholder="ප්‍රදේශය" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400" required>
                    <input type="text" id="location" placeholder="ස්ථානය" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-400" required>
                    <select id="gasType" class="w-full p-3 border rounded-xl outline-none bg-white">
                        <option value="Litro">Litro Gas (ලිට්රෝ)</option>
                        <option value="Laugfs">Laugfs Gas (ලාෆ්ස්)</option>
                    </select>
                    <select id="queueStatus" class="w-full p-3 border rounded-xl outline-none bg-white">
                        <option value="නැත">පෝලීමක් නැත</option>
                        <option value="ඔව්">දිගු පෝලීමක් ඇත</option>
                    </select>
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition">යොමු කරන්න</button>
                </form>
            </div>

            <div class="md:col-span-2">
                <input type="text" id="searchBar" placeholder="නගරය සර්ච් කරන්න..." class="w-full p-4 border rounded-2xl shadow-sm mb-6 outline-none focus:ring-2 focus:ring-blue-300">
                <div id="gasList" class="space-y-4 text-center">
                    <p class="text-gray-400 italic">දත්ත ලබා ගනිමින් පවතී...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        // 🔥 මෙතනට ඔබේ Firebase අගයන් ඇතුළත් කරන්න (Copy-Paste from Firebase Console)
        const firebaseConfig = {
            apiKey: "මෙතනට_ඔබේ_ApiKey",
            authDomain: "ඔබේ_ID.firebaseapp.com",
            databaseURL: "https://ඔබේ_ID-default-rtdb.firebaseio.com",
            projectId: "ඔබේ_ID",
            storageBucket: "ඔබේ_ID.appspot.com",
            messagingSenderId: "ID_අංකය",
            appId: "ID_අංකය"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const gasRef = ref(db, 'gas_data');

        // Submit Data to Firebase
        document.getElementById('gasForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const info = {
                district: document.getElementById('district').value,
                location: document.getElementById('location').value,
                gasType: document.getElementById('gasType').value,
                queue: document.getElementById('queueStatus').value,
                time: new Date().toLocaleTimeString(),
                date: new Date().toLocaleDateString()
            };
            push(gasRef, info);
            document.getElementById('gasForm').reset();
        });

        // Real-time Data Loading
        onValue(gasRef, (snapshot) => {
            const data = snapshot.val();
            const gasList = document.getElementById('gasList');
            gasList.innerHTML = '';
            
            if (data) {
                Object.values(data).reverse().forEach(log => {
                    const brandLogo = log.gasType === 'Litro' ? 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Litro_Gas_Lanka_Logo.png/220px-Litro_Gas_Lanka_Logo.png' : 'https://www.laugfs.lk/images/logo.png';
                    const brandColor = log.gasType === 'Litro' ? 'border-blue-500' : 'border-yellow-500';

                    gasList.innerHTML += `
                        <div class="gas-card bg-white p-5 rounded-2xl shadow-sm border-l-8 ${brandColor} flex items-center gap-4 text-left">
                            <img src="${brandLogo}" class="w-14 h-14 object-contain">
                            <div class="flex-grow">
                                <h3 class="font-bold text-lg">${log.district} - ${log.location}</h3>
                                <p class="text-sm">වර්ගය: <b>${log.gasType}</b> | පෝලීම: <span class="${log.queue === 'ඔව්' ? 'text-red-600' : 'text-green-600'} font-bold">${log.queue}</span></p>
                                <span class="text-xs text-gray-400">${log.date} | ${log.time}</span>
                            </div>
                        </div>
                    `;
                });
            } else {
                gasList.innerHTML = '<p class="text-gray-400">තවමත් දත්ත කිසිවක් නැත.</p>';
            }
        });
    </script>
</body>
</html>
